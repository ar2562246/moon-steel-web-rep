name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile --config.strict-dep-builds=false

      - name: Typecheck
        run: corepack pnpm run typecheck

      - name: Build moonsteel
        run: corepack pnpm --filter @workspace/moonsteel run build
