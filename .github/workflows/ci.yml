name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile --config.strict-dep-builds=false

      - name: Typecheck
        run: corepack pnpm run typecheck

      - name: Build moonsteel
        run: corepack pnpm --filter @workspace/moonsteel run build

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile --config.strict-dep-builds=false

      - name: Install Playwright browsers
        run: corepack pnpm --filter @workspace/moonsteel exec playwright install --with-deps chromium

      - name: Build moonsteel
        run: corepack pnpm --filter @workspace/moonsteel run build

      - name: Run E2E smoke tests
        run: corepack pnpm --filter @workspace/moonsteel run test:e2e
        env:
          CI: true
